<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — FRAGK</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="mobile-backdrop" onclick="toggleMobileSidebar()"></div>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <div class="main-content">
      <div class="topbar-mount"></div>

      <main class="page-body">
        <div class="tabs" id="settingsTabs">
          <button class="tab-btn active" data-tab="Account">Account</button>
          <button class="tab-btn" data-tab="Preferences">Preferences</button>
          <button class="tab-btn" data-tab="Notifications">Notifications</button>
          <button class="tab-btn" data-tab="Privacy">Privacy</button>
          <button class="tab-btn" data-tab="Security">Security</button>
        </div>

        <!-- Account -->
        <div id="accountSection">
          <div class="card" style="padding:20px; max-width:500px;">
            <p class="section-title">Profile Information</p>

            <div style="display:flex; align-items:center; gap:16px; margin-bottom:20px;">
              <div class="avatar-circle" id="avatarPreview" style="width:64px; height:64px; font-size:18px;"></div>
              <div>
                <label class="btn btn-outline" style="font-size:12px; padding:6px 12px; cursor:pointer;">
                  <span id="uploadLabel">Change Photo</span>
                  <input type="file" id="avatarInput" accept="image/*" style="display:none;" />
                </label>
                <p class="text-muted" style="font-size:10px; margin:6px 0 0;">JPG, PNG or WEBP, up to 2MB.</p>
              </div>
            </div>

            <div style="display:flex; flex-direction:column; gap:12px;">
              <div><label class="field-label">Full Name</label><input id="fullName" class="input" /></div>
              <div><label class="field-label">Email Address</label><input id="email" class="input" disabled /></div>
            </div>

            <p id="msg" style="font-size:12px; display:none; margin-top:12px;"></p>
            <button id="saveBtn" class="btn btn-primary" style="width:100%; margin-top:12px;">Save Changes</button>
          </div>
        </div>

        <!-- Preferences -->
        <div id="preferencesSection" style="display:none;">
          <div class="card" style="padding:20px; max-width:500px;">
            <p class="section-title">Preferences</p>
            <div id="preferencesToggles"></div>
          </div>
        </div>

        <!-- Notifications -->
        <div id="notificationsSection" style="display:none;">
          <div class="card" style="padding:20px; max-width:500px;">
            <p class="section-title">Notifications</p>
            <div id="notificationsToggles"></div>
          </div>
        </div>

        <!-- Privacy -->
        <div id="privacySection" style="display:none;">
          <div class="card" style="padding:20px; max-width:500px;">
            <p class="section-title">Privacy</p>
            <div id="privacyToggles"></div>
          </div>
        </div>

        <!-- Security -->
        <div id="securitySection" style="display:none;">
          <div class="card" style="padding:20px; max-width:500px;">
            <p class="section-title">Account Security</p>
            <div style="display:flex; flex-direction:column; gap:10px; font-size:14px;">
              <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(28,39,64,0.6); padding-bottom:10px;"><span class="text-muted">Two-Factor Authentication</span><span class="text-warning">Not set up</span></div>
              <div style="display:flex; justify-content:space-between; border-bottom:1px solid rgba(28,39,64,0.6); padding-bottom:10px;"><span class="text-muted">Email Verification</span><span class="text-muted">Not implemented yet</span></div>
              <div style="display:flex; justify-content:space-between;"><span class="text-muted">Login Sessions</span><span class="text-muted">Active</span></div>
            </div>
            <button class="btn btn-outline text-danger" style="width:100%; margin-top:16px; border-color:rgba(248,113,113,0.5);">Delete Account</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script>
    AUTH.requireAuth();
    initShell("settings.html", "Settings", "Manage your account, preferences and security.");

    const user = AUTH.getUser();
    document.getElementById("fullName").value = user?.full_name || "";
    document.getElementById("email").value = user?.email || "";

    function renderAvatar() {
      const u = AUTH.getUser();
      const avatarUrl = u?.avatar_url;
      const name = u?.full_name || "?";
      const initials = name.split(" ").map((w) => w[0]).join("").slice(0, 2).toUpperCase();
      document.getElementById("avatarPreview").innerHTML = avatarUrl
        ? `<img src="${avatarUrl}" alt="Profile" />`
        : initials;
    }
    renderAvatar();

    document.getElementById("avatarInput").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const label = document.getElementById("uploadLabel");
      label.textContent = "Uploading…";

      try {
        await AUTH.uploadAvatar(file);
        renderAvatar();
      } catch (err) {
        alert(err.message);
      } finally {
        label.textContent = "Change Photo";
      }
    });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      const msg = document.getElementById("msg");
      try {
        await AUTH.updateProfile(document.getElementById("fullName").value);
        msg.textContent = "Profile saved.";
        msg.className = "text-success";
        msg.style.display = "block";
      } catch (err) {
        msg.textContent = err.message;
        msg.className = "text-danger";
        msg.style.display = "block";
      }
    });

    // ---- Tabs: switch which section is visible ----
    const SECTION_IDS = {
      Account: "accountSection",
      Preferences: "preferencesSection",
      Notifications: "notificationsSection",
      Privacy: "privacySection",
      Security: "securitySection",
    };
    document.querySelectorAll("#settingsTabs .tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#settingsTabs .tab-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const activeTab = btn.dataset.tab;
        Object.entries(SECTION_IDS).forEach(([tab, id]) => {
          document.getElementById(id).style.display = tab === activeTab ? "block" : "none";
        });
      });
    });

    // ---- Toggle rows (Preferences / Notifications / Privacy) — now persisted to the backend ----
    let currentSettings = {};

    function toggleRow(field, label, desc) {
      const checked = Number(currentSettings[field]) === 1;
      return `
        <label style="display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(28,39,64,0.6); cursor:pointer;">
          <div style="padding-right:16px;">
            <p style="margin:0; font-size:14px;">${label}</p>
            <p style="margin:2px 0 0; font-size:12px; color:var(--muted);">${desc}</p>
          </div>
          <input type="checkbox" ${checked ? "checked" : ""} onchange="saveSetting('${field}', this.checked)" style="width:18px; height:18px; accent-color:var(--primary); cursor:pointer; flex-shrink:0;" />
        </label>`;
    }

    function renderToggles() {
      document.getElementById("preferencesToggles").innerHTML = [
        toggleRow("compact_sidebar", "Compact Sidebar", "Show a narrower sidebar with icons only."),
        toggleRow("show_tooltips", "Show Tooltips", "Display helpful hints when hovering over stats."),
        toggleRow("autosave_reports", "Auto-save Reports", "Automatically save analyzed screenshots without a manual click."),
      ].join("");

      document.getElementById("notificationsToggles").innerHTML = [
        toggleRow("notif_email", "Email Notifications", "Get emailed when a report is approved or rejected."),
        toggleRow("notif_push", "Push Notifications", "Browser notifications for new activity."),
        toggleRow("notif_weekly", "Weekly Summary", "A weekly email recap of your stats."),
        toggleRow("notif_team", "Teammate Alerts", "Notify me when a teammate joins or leaves."),
      ].join("");

      document.getElementById("privacyToggles").innerHTML = [
        toggleRow("privacy_profile", "Show Profile to Teammates", "Let teammates see your profile and stats."),
        toggleRow("privacy_leaderboard", "Show on Leaderboard", "Include my stats on public leaderboards."),
        toggleRow("privacy_invites", "Allow Team Invites", "Let other players invite you to their team."),
      ].join("");
    }

    async function loadSettings() {
      try {
        const session = AUTH.getSession();
        const res = await fetch(`${API_URL}/api/user-settings.php`, { headers: { Authorization: `Bearer ${session.token}` } });
        const data = await res.json();
        if (res.ok) currentSettings = data.settings || {};
      } catch (err) {
        console.error("Failed to load settings", err);
      }
      renderToggles();
    }

    async function saveSetting(field, value) {
      currentSettings[field] = value ? 1 : 0;
      try {
        const session = AUTH.getSession();
        await fetch(`${API_URL}/api/user-settings.php`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${session.token}` },
          body: JSON.stringify({ [field]: value }),
        });
      } catch (err) {
        console.error("Failed to save setting", err);
      }
    }

    loadSettings();
  </script>
</body>
</html>
