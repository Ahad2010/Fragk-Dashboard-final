<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — FRAGK</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
<script src="js/chart.min.js"></script></head>
<body>
  <div class="mobile-backdrop" onclick="toggleMobileSidebar()"></div>

  <!-- Onboarding: Create/Join Team popup (forced, no team yet) -->
  <div class="modal-backdrop" id="onboardTeamBackdrop">
    <div class="card modal-box" style="max-width:420px;">
      <h3>Welcome to FRAGK!</h3>
      <p class="modal-desc">Add your first player to get started, or join an existing team with a code.</p>

      <div class="tabs" style="margin-bottom:16px;">
        <button type="button" class="tab-btn active" id="onboardCreateTab" onclick="setOnboardTab('create')">Add Player</button>
        <button type="button" class="tab-btn" id="onboardJoinTab" onclick="setOnboardTab('join')">Join Team</button>
      </div>

      <div id="onboardCreateSection">
        <div id="onboardCreateError" class="form-error"></div>
        <div class="auth-field">
          <label class="field-label">Player Name</label>
          <input class="input" id="onboardPlayerName" placeholder="e.g. FRAGGERxYT" />
        </div>
        <div class="auth-field">
          <label class="field-label">Role</label>
          <select class="input" id="onboardPlayerRole">
            <option>IGL</option><option selected>Fragger</option><option>Support</option><option>Sniper</option><option>Entry Fragger</option>
          </select>
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="onboardCreateTeam(this)">Add Player</button>
      </div>

      <div id="onboardJoinSection" style="display:none;">
        <div id="onboardJoinError" class="form-error"></div>
        <div class="auth-field">
          <label class="field-label">Join Code</label>
          <input class="input" id="onboardJoinCode" placeholder="e.g. A1B2C3" style="text-transform:uppercase;" />
        </div>
        <button class="btn btn-primary" style="width:100%;" onclick="onboardJoinTeam(this)">Join Team</button>
      </div>
    </div>
  </div>

  <div class="app-shell">
    <aside class="sidebar"></aside>
    <div class="main-content">
      <div class="topbar-mount"></div>

      <main class="page-body">
        <div class="stat-grid">
          <div class="card stat-card">
            <p class="label">Matches Played</p>
            <p class="value" id="statMatches"><span class="skeleton" style="width:50px; height:32px;"></span></p>
          </div>
          <div class="card stat-card">
            <p class="label">Total Kills</p>
            <p class="value" id="statKills"><span class="skeleton" style="width:50px; height:32px;"></span></p>
          </div>
          <div class="card stat-card">
            <p class="label">Win Rate</p>
            <p class="value" id="statWinRate"><span class="skeleton" style="width:70px; height:32px;"></span></p>
          </div>
          <div class="card stat-card">
            <p class="label">K/D Ratio</p>
            <p class="value" id="statKD"><span class="skeleton" style="width:50px; height:32px;"></span></p>
          </div>
        </div>

        <div class="card" style="padding:20px;">
          <div class="section-title">
            <span>Performance Overview</span>
            <div style="display:flex; gap:8px;">
<select id="metricSelect" class="input" style="width:auto; padding:6px 10px; font-size:12px;">                <option value="kills">Kills</option>
                <option value="points">Points</option>
              </select>
              <select id="rangeSelect" class="input" style="width:auto; padding:6px 10px; font-size:12px;">
                <option value="7">7 Days</option>
                <option value="14">14 Days</option>
                <option value="30">30 Days</option>
                <option value="60">All Time</option>
              </select>
            </div>
          </div>
          <div class="chart-wrap" style="height:220px; position:relative;">
            <span id="chartSkeleton" class="skeleton" style="position:absolute; inset:0; border-radius:12px;"></span>
            <canvas id="perfChart"></canvas>
          </div>
        </div>

        <div class="grid-2">
          <div class="card" style="padding:20px;">
            <div class="section-title">
              <span>Recent Matches</span>
              <a href="matches.html" class="text-primary-light" style="font-size:12px;">View All</a>
            </div>
            <div id="recentMatches" style="display:flex; flex-direction:column; gap:12px;">
              <span class="skeleton" style="width:100%; height:48px;"></span>
              <span class="skeleton" style="width:100%; height:48px;"></span>
              <span class="skeleton" style="width:100%; height:48px;"></span>
            </div>
          </div>

          <div class="card" style="padding:20px;">
            <div class="section-title">
              <span style="display:flex; align-items:center; gap:8px;">
                Stats Analyzer
                <span style="background:rgba(52,211,153,0.15); color:var(--success); font-size:10px; padding:2px 8px; border-radius:99px;">98% AI Accuracy</span>
              </span>
              <a href="stats-analyzer.html" class="text-primary-light" style="font-size:12px;">Try Again</a>
            </div>
            <div id="statRows" style="display:flex; flex-direction:column; gap:12px;">
              <span class="skeleton" style="width:100%; height:44px;"></span>
              <span class="skeleton" style="width:100%; height:44px;"></span>
              <span class="skeleton" style="width:100%; height:44px;"></span>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script>
    AUTH.requireAuth();
    const user = AUTH.getUser();
    const userName = user?.full_name || user?.email?.split("@")[0] || "Player";
    initShell("dashboard.html", `Welcome back, ${userName}`, "Here's your performance overview");

    // ---- New-user onboarding: must have a team + at least one roster player ----
    (async () => {
      try {
        const session = AUTH.getSession();

        const teamRes = await fetch(`${API_URL}/api/my-team-status.php`, { headers: { Authorization: `Bearer ${session.token}` } });
        const teamData = await teamRes.json();

        if (!teamData.team) {
          document.getElementById("onboardTeamBackdrop").classList.add("open");
          return;
        }

        const playersRes = await fetch(`${API_URL}/api/team-players.php`, { headers: { Authorization: `Bearer ${session.token}` } });
        const playersData = await playersRes.json();
        const roster = playersData.players || [];

        if (roster.length === 0) {
          lockAddPlayerModal("Welcome! Add at least one player to your roster to get started.");
        }
      } catch (err) {
        console.error("Onboarding check failed", err);
      }
    })();

    function setOnboardTab(tab) {
      document.getElementById("onboardCreateTab").classList.toggle("active", tab === "create");
      document.getElementById("onboardJoinTab").classList.toggle("active", tab === "join");
      document.getElementById("onboardCreateSection").style.display = tab === "create" ? "block" : "none";
      document.getElementById("onboardJoinSection").style.display = tab === "join" ? "block" : "none";
    }

    async function onboardCreateTeam(btn) {
      if (btn.disabled) return; // guard against rapid double-clicks

      const playerName = document.getElementById("onboardPlayerName").value.trim();
      const errorBox = document.getElementById("onboardCreateError");
      errorBox.classList.remove("show");

      if (!playerName) {
        errorBox.textContent = "Player name is required";
        errorBox.classList.add("show");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Adding…";

      try {
        const session = AUTH.getSession();
        const currentUser = AUTH.getUser();
        const autoTeamName = `${currentUser?.full_name || userName}'s Team`;

        const res = await fetch(`${API_URL}/api/team.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${session.token}` },
          body: JSON.stringify({ name: autoTeamName }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to set up your team");

        // Team's ready — now add the player.
        const playerRes = await fetch(`${API_URL}/api/team-players.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${session.token}` },
          body: JSON.stringify({ name: playerName, role: document.getElementById("onboardPlayerRole").value }),
        });
        const playerData = await playerRes.json();
        if (!playerRes.ok) throw new Error(playerData.error || "Team set up, but failed to add player");

        document.getElementById("onboardTeamBackdrop").classList.remove("open");
        window.location.reload();
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Add Player";
      }
    }

    async function onboardJoinTeam(btn) {
      if (btn.disabled) return; // guard against rapid double-clicks

      const code = document.getElementById("onboardJoinCode").value.trim();
      const errorBox = document.getElementById("onboardJoinError");
      errorBox.classList.remove("show");

      if (!code) {
        errorBox.textContent = "Enter a join code";
        errorBox.classList.add("show");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Joining…";

      try {
        const session = AUTH.getSession();
        const res = await fetch(`${API_URL}/api/join-team.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${session.token}` },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to join team");

        // Joining auto-adds you to the roster too, so no Add Player step needed — just refresh.
        window.location.reload();
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Join Team";
      }
    }

    // Same map image lookup as matches.html — keep these two in sync.
    const MAP_IMAGES = {
      erangel: "assets/erangel.jpeg",
      miramar: "assets/miramar.jpeg",
      rondo: "assets/rondo.jpeg",
    };
    function mapAvatarHtml(mapName) {
      const key = (mapName || "").toLowerCase();
      const letter = (mapName || "?")[0];
      const img = MAP_IMAGES[key];
      if (img) {
        return `<div class="map-avatar" style="padding:0; overflow:hidden;">
          <img src="${img}" alt="${mapName}" style="width:100%;height:100%;object-fit:cover;"
               onerror="this.closest('.map-avatar').style.padding='';this.closest('.map-avatar').textContent='${letter}';" />
        </div>`;
      }
      return `<div class="map-avatar">${letter}</div>`;
    }

    // ---- Recent matches: real data only, no demo fallback ----

    function renderRecentMatches(matches) {
      if (matches.length === 0) {
        document.getElementById("recentMatches").innerHTML = `<p class="text-muted" style="font-size:13px; margin:0;">No matches yet — upload a screenshot in Stats Analyzer to get started.</p>`;
        return;
      }
      document.getElementById("recentMatches").innerHTML = matches.map(
        (m) => `
        <div style="display:flex; align-items:center; gap:12px; font-size:14px;">
          ${mapAvatarHtml(m.map)}
          <div style="flex:1;">
            <p style="margin:0; font-weight:500;">${m.map || "Unknown"}</p>
            <p style="margin:0; font-size:12px; color:var(--muted);">${m.date}</p>
          </div>
          <div style="text-align:right;">
            <p style="margin:0; font-size:12px; color:var(--success);">${m.rank}</p>
            <p style="margin:0; font-size:12px; color:var(--muted);">${m.kills} Kills</p>
          </div>
          <p style="width:60px; text-align:right; font-weight:600; margin:0;">${m.points}</p>
        </div>`
      ).join("");
    }

    // ---- Stats Analyzer: shows the most recently saved/analyzed match, real data only ----
    function renderStatsAnalyzer(latestMatch) {
      const wrap = document.getElementById("statRows");
      if (!latestMatch) {
        wrap.innerHTML = `<p class="text-muted" style="font-size:13px; margin:0;">No matches analyzed yet — upload a screenshot to see your latest stats here.</p>`;
        return;
      }
      const rows = [
        { label: "Latest Kills", value: latestMatch.kills ?? "-" },
        { label: "Map", value: latestMatch.map || "-" },
        { label: "Placement", value: latestMatch.placement ? `#${latestMatch.placement}` : "-" },
        { label: "MVP", value: latestMatch.mvp || "-" },
      ];
      wrap.innerHTML = rows.map(
        (s) => `
        <div style="display:flex; align-items:center; justify-content:space-between; border:1px solid var(--surface-border); background:var(--surface); border-radius:8px; padding:12px 16px;">
          <span class="text-muted" style="font-size:14px;">${s.label}</span>
          <span class="text-primary-light" style="font-size:16px; font-weight:600;">${s.value}</span>
        </div>`
      ).join("");
    }

    let allMatches = [];

    (async () => {
      try {
        const session = AUTH.getSession();
        const res = await fetch(`${API_URL}/api/matches.php`, { headers: { Authorization: `Bearer ${session.token}` } });
        const data = await res.json();
        if (res.ok && data.matches && data.matches.length > 0) {
          const matches = data.matches;
          allMatches = matches;
          const mapped = matches.slice(0, 4).map((m) => ({
            map: m.map,
            date: new Date(m.created_at).toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit" }),
            rank: m.placement ? `#${m.placement}` : "-",
            kills: m.kills ?? 0,
            points: m.points ?? 0,
          }));
          renderRecentMatches(mapped);
          renderStatsAnalyzer(matches[0]); // already newest-first from matches.php's ORDER BY created_at DESC

          const matchesPlayed = matches.length;
          const totalKills = matches.reduce((sum, m) => sum + (Number(m.kills) || 0), 0);
          const wins = matches.filter((m) => Number(m.placement) === 1).length;
          const winRate = ((wins / matchesPlayed) * 100).toFixed(1);
          const kd = (totalKills / Math.max(1, matchesPlayed - wins)).toFixed(2);

          document.getElementById("statMatches").textContent = matchesPlayed;
          document.getElementById("statKills").textContent = totalKills;
          document.getElementById("statWinRate").textContent = `${winRate}%`;
          document.getElementById("statKD").textContent = kd;
        } else {
          allMatches = [];
          renderRecentMatches([]);
          renderStatsAnalyzer(null);
          ["statMatches", "statKills", "statWinRate", "statKD"].forEach((id) => {
            document.getElementById(id).textContent = "0";
          });
        }
      } catch {
        allMatches = [];
        renderRecentMatches([]);
        renderStatsAnalyzer(null);
        ["statMatches", "statKills", "statWinRate", "statKD"].forEach((id) => {
          document.getElementById(id).textContent = "-";
        });
      }
      updateChart();
    })();

    // ---- Chart.js interactive performance chart — built from real matches only ----
    function buildSeriesFromMatches(matches, metric, days) {
      let filtered = matches;
      if (days !== "all") {
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - Number(days));
        filtered = matches.filter((m) => new Date(m.created_at) >= cutoff);
      }

      // Group by calendar day and sum the chosen metric — only days with real
      // activity appear, so a brand-new account just shows an empty chart
      // instead of a fabricated history.
      const byDay = {};
      filtered.forEach((m) => {
        const day = new Date(m.created_at).toISOString().slice(0, 10);
        const value = metric === "points" ? Number(m.points) || 0 : Number(m.kills) || 0;
        byDay[day] = (byDay[day] || 0) + value;
      });

      const sortedDays = Object.keys(byDay).sort();
      const labels = sortedDays.map((d) => new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric" }));
      const values = sortedDays.map((d) => byDay[d]);
      return { labels, values };
    }

    const ctx = document.getElementById("perfChart").getContext("2d");
    const gradient = ctx.createLinearGradient(0, 0, 0, 220);
gradient.addColorStop(0, "rgba(34,211,238,0.3)");
    gradient.addColorStop(1, "rgba(34,211,238,0)");

let chart = new Chart(ctx, {
      type: "line",
      data: {
        labels: [],
        datasets: [{
          data: [],
          borderColor: "#22d3ee",
          backgroundColor: gradient,
          fill: true,
          tension: 0.35,
          cubicInterpolationMode: "monotone",
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 6,
          pointHoverBackgroundColor: "#22d3ee",
          pointHoverBorderColor: "#0b1220",
          pointHoverBorderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: "#0F172A",
            borderColor: "#1E293B",
            borderWidth: 1,
            titleColor: "#F8FAFC",
            bodyColor: "#22d3ee",
            titleFont: { size: 12, weight: "600" },
            bodyFont: { size: 13, weight: "700" },
            padding: 10,
            cornerRadius: 8,
            displayColors: false,
          },
        },
        scales: {
          x: { grid: { color: "rgba(28,39,64,0.5)" }, ticks: { color: "#8a92a8", font: { size: 11 } } },
          y: { grid: { color: "rgba(28,39,64,0.5)" }, ticks: { color: "#8a92a8", font: { size: 11 }, precision: 0 } },
        },
      },
    });

    function updateChart() {
      const metric = document.getElementById("metricSelect").value;
      const rangeValue = document.getElementById("rangeSelect").value;
      const days = rangeValue === "60" ? "all" : rangeValue; // "60" option = "All Time" in the dropdown
      const { labels, values } = buildSeriesFromMatches(allMatches, metric, days);
      chart.data.labels = labels;
      chart.data.datasets[0].data = values;
      chart.update();
      document.getElementById("chartSkeleton")?.remove();
    }
    document.getElementById("metricSelect").addEventListener("change", updateChart);
    document.getElementById("rangeSelect").addEventListener("change", updateChart);
    updateChart();
  </script>
</body>
</html>
