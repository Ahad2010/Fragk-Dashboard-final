<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics — FRAGK</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
<script src="js/chart.min.js"></script></head>
<body>
  <div class="mobile-backdrop" onclick="toggleMobileSidebar()"></div>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <div class="main-content">
      <div class="topbar-mount"></div>

      <main class="page-body">
        <div class="tabs" id="analyticsTabs">
          <button class="tab-btn active" data-tab="Overview">Overview</button>
          <button class="tab-btn" data-tab="Teamplay">Teamplay</button>
        </div>

        <div id="overviewSection">
          <div class="stat-grid" style="grid-template-columns:repeat(3,1fr);">
            <div class="card stat-card"><p class="label">Matches Played</p><p class="value" id="statMatches">-</p></div>
            <div class="card stat-card"><p class="label">Win Rate</p><p class="value" id="statWinRate">-</p></div>
            <div class="card stat-card"><p class="label">K/D Ratio</p><p class="value" id="statKD">-</p></div>
          </div>

          <div class="grid-2" style="margin-top:24px;">
            <div class="card" style="padding:20px;">
              <p class="section-title">Kills Trend</p>
              <div class="chart-wrap" style="height:180px;"><canvas id="trendChart"></canvas></div>
            </div>
            <div class="card" style="padding:20px;">
              <p class="section-title">Matches by Mode</p>
              <div style="display:flex; align-items:center; gap:24px;">
                <div style="width:110px; height:110px;"><canvas id="modeDonut"></canvas></div>
                <div id="modeLegend" style="display:flex; flex-direction:column; gap:6px; font-size:12px;"></div>
              </div>
            </div>
          </div>
        </div>

        <div id="teamplaySection" style="display:none; max-width:400px;"></div>
      </main>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/charts.js"></script>
  <script>
    AUTH.requireAuth();
    initShell("analytics.html", "Analytics", "Dive into your performance and improve every match.");

    (async () => {
      let matches = [];
      try {
        const session = AUTH.getSession();
        const res = await fetch(`${API_URL}/api/matches.php`, { headers: { Authorization: `Bearer ${session.token}` } });
        const data = await res.json();
        if (res.ok) matches = data.matches || [];
      } catch (err) {
        console.error("Failed to load matches", err);
      }

      matches.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

      const matchesPlayed = matches.length;
      const totalKills = matches.reduce((sum, m) => sum + (Number(m.kills) || 0), 0);
      const wins = matches.filter((m) => Number(m.placement) === 1).length;
      const winRate = matchesPlayed ? ((wins / matchesPlayed) * 100).toFixed(1) : "0.0";
      const kd = (totalKills / Math.max(1, matchesPlayed - wins)).toFixed(2);

      document.getElementById("statMatches").textContent = matchesPlayed;
      document.getElementById("statWinRate").textContent = `${winRate}%`;
      document.getElementById("statKD").textContent = matchesPlayed ? kd : "-";

      const trendLabels = matches.map((m) => new Date(m.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric" }));
      const trendKills = matches.map((m) => Number(m.kills) || 0);
      makeLineChart("trendChart", trendLabels.length ? trendLabels : ["No matches yet"], [
        { label: "Kills", data: trendKills.length ? trendKills : [0], color: "#22d3ee", fill: true },
      ]);

      const MODE_LABELS = ["Tournament", "Scrims", "Daily Battle"];
      const MODE_VALUES = MODE_LABELS.map(
        (label) => matches.filter((m) => (m.mode || "").toLowerCase() === label.toLowerCase()).length
      );
      const MODE_COLORS = ["#2563EB", "#22d3ee", "#a855f7"];
      makeDonutChart("modeDonut", MODE_LABELS, MODE_VALUES, MODE_COLORS);

      const modeTotal = MODE_VALUES.reduce((a, b) => a + b, 0) || 1;
      document.getElementById("modeLegend").innerHTML = MODE_LABELS.map(
        (l, i) => `<span style="display:flex; align-items:center; gap:6px; color:var(--muted);"><span style="width:6px;height:6px;border-radius:50%;background:${MODE_COLORS[i]};display:inline-block;"></span>${l} — ${MODE_VALUES[i]} (${((MODE_VALUES[i] / modeTotal) * 100).toFixed(1)}%)</span>`
      ).join("");

      // Teamplay is the only summary section left — Combat/Survival stats (headshots,
      // damage, survival time) aren't part of the esports scoring model, so they're gone.
      document.getElementById("teamplaySection").innerHTML = `
        <div class="card" style="padding:20px;">
          <p class="section-title">Teamplay Summary</p>
          <div style="display:flex; flex-direction:column; gap:10px;">
            <div style="display:flex; justify-content:space-between; font-size:14px;"><span class="text-muted">Matches Played</span><span style="font-weight:500;">${matchesPlayed}</span></div>
            <div style="display:flex; justify-content:space-between; font-size:14px;"><span class="text-muted">Total Kills</span><span style="font-weight:500;">${totalKills}</span></div>
            <div style="display:flex; justify-content:space-between; font-size:14px;"><span class="text-muted">Wins</span><span style="font-weight:500;">${wins}</span></div>
          </div>
        </div>`;
    })();

    document.querySelectorAll("#analyticsTabs .tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#analyticsTabs .tab-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        document.getElementById("overviewSection").style.display = tab === "Overview" ? "block" : "none";
        document.getElementById("teamplaySection").style.display = tab === "Teamplay" ? "block" : "none";
      });
    });
  </script>
</body>
</html>
