<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — FRAGK</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
    <div style="width:100%; max-width:380px;">
      <div style="text-align:center; margin-bottom:24px;">
        <a href="dashboard.html"><img src="assets/logo.png" alt="FRAGK" style="height:32px;" /></a>
      </div>

      <div class="card" style="padding:32px;">
        <h1 style="margin:0; font-size:24px; font-weight:700;">Welcome Back</h1>
        <p class="text-muted" style="margin:4px 0 0; font-size:14px;">Login to continue tracking your game stats</p>

        <form id="loginForm" style="margin-top:24px; display:flex; flex-direction:column; gap:16px;">
          <div>
            <label class="field-label" for="email">Email Address</label>
            <input class="input" type="email" id="email" required placeholder="Enter your email" />
          </div>
          <div>
            <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
              <label class="field-label" for="password" style="margin:0;">Password</label>
              <a href="#" class="text-primary-light" style="font-size:12px;">Forgot?</a>
            </div>
            <input class="input" type="password" id="password" required placeholder="Enter your password" />
          </div>

          <label style="display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted);">
            <input type="checkbox" id="remember" checked /> Remember Me
          </label>

          <p id="errorMsg" class="text-danger" style="font-size:12px; display:none;"></p>

          <button type="submit" class="btn btn-primary" id="loginBtn">LOGIN</button>
        </form>

        <div style="display:flex; align-items:center; gap:12px; margin:16px 0;">
          <div style="flex:1; height:1px; background:var(--surface-border);"></div>
          <span class="text-muted" style="font-size:12px;">OR</span>
          <div style="flex:1; height:1px; background:var(--surface-border);"></div>
        </div>

        <button class="btn btn-outline" style="width:100%;" onclick="alert('Wire this up to Supabase Google OAuth or your PHP session bridge.')">
          Continue with Google
        </button>

        <p class="text-muted" style="text-align:center; font-size:14px; margin-top:24px;">
          Don't have an account? <a href="register.html" class="text-primary-light">Sign up</a>
        </p>
      </div>
    </div>
  </main>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("loginBtn");
      const errorMsg = document.getElementById("errorMsg");
      errorMsg.style.display = "none";
      btn.textContent = "Logging in…";
      btn.disabled = true;

      try {
        await AUTH.signIn(
          document.getElementById("email").value,
          document.getElementById("password").value
        );
        window.location.href = "dashboard.html";
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = "block";
        btn.textContent = "LOGIN";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
