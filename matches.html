<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matches — FRAGK</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="mobile-backdrop" onclick="toggleMobileSidebar()"></div>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <div class="main-content">
      <div class="topbar-mount"></div>

      <main class="page-body">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
          <div class="tabs" id="tabs">
            <button class="tab-btn active" data-tab="All Matches">All Matches</button>
            <button class="tab-btn" data-tab="Tournament">Tournament</button>
            <button class="tab-btn" data-tab="Scrims">Scrims</button>
            <button class="tab-btn" data-tab="Daily Battle">Daily Battle</button>
          </div>
          <button type="button" id="toggleAddForm" class="btn btn-outline" style="font-size:13px;">+ Add Match</button>
        </div>

        <form id="customForm" class="card" style="padding:20px; display:none; flex-direction:column; gap:12px;">
          <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;">
            <div>
              <label class="field-label">Map</label>
              <select id="cMap" class="input">
                <option>Erangel</option><option>Miramar</option><option>Rondo</option>
              </select>
            </div>
            <div>
              <label class="field-label">Placement</label>
              <input id="cPlacement" type="number" class="input" />
            </div>
            <div>
              <label class="field-label">Mode</label>
              <select id="cMode" class="input">
                <option>Tournament</option><option>Scrims</option><option>Daily Battle</option>
              </select>
            </div>
          </div>
          <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px;">
            <div>
              <label class="field-label">Player 1</label>
              <input id="cP1Name" type="text" class="input" placeholder="Name" style="margin-bottom:6px;" />
              <input id="cP1" type="number" class="input" placeholder="Kills" />
            </div>
            <div>
              <label class="field-label">Player 2</label>
              <input id="cP2Name" type="text" class="input" placeholder="Name" style="margin-bottom:6px;" />
              <input id="cP2" type="number" class="input" placeholder="Kills" />
            </div>
            <div>
              <label class="field-label">Player 3</label>
              <input id="cP3Name" type="text" class="input" placeholder="Name" style="margin-bottom:6px;" />
              <input id="cP3" type="number" class="input" placeholder="Kills" />
            </div>
            <div>
              <label class="field-label">Player 4</label>
              <input id="cP4Name" type="text" class="input" placeholder="Name" style="margin-bottom:6px;" />
              <input id="cP4" type="number" class="input" placeholder="Kills" />
            </div>
          </div>
          <div style="font-size:12px; color:var(--muted); display:flex; gap:16px;">
            <span>Total Kills: <b id="cTotalKills" style="color:var(--foreground);">0</b></span>
            <span>Total Points: <b id="cTotalPoints" style="color:var(--primary-light);">0</b></span>
            <span>MVP: <b id="cMvp" style="color:var(--warning);">-</b></span>
          </div>
          <button type="submit" class="btn btn-primary" style="align-self:flex-start; padding:10px 24px;">Add Match</button>
          <p id="customMsg" class="text-primary-light" style="font-size:12px; display:none;"></p>
        </form>

        <div class="card" style="overflow-x:auto;">
          <div id="matchesTableWrap" style="padding:24px; color:var(--muted); font-size:14px;">Loading matches…</div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/scoring.js"></script>
  <script>
    AUTH.requireAuth();
    initShell("matches.html", "Matches", "View and analyze all your recent matches.");

    // Only these 3 maps are currently supported end-to-end (screenshot analysis
    // rejects anything else — see api/analyze-screenshot.php). Ahad: drop the
    // actual thumbnail files in here with these exact names and they'll show
    // automatically; until then it falls back to the letter avatar.
    const MAP_IMAGES = {
      erangel: "assets/erangel.jpeg",
      miramar: "assets/miramar.jpeg",
      rondo: "assets/rondo.jpeg",
    };

    function mapAvatarHtml(mapName) {
      const key = (mapName || "").toLowerCase();
      const letter = (mapName || "?")[0];
      const img = MAP_IMAGES[key];
      if (img) {
        return `<div class="map-avatar" style="padding:0; overflow:hidden;">
          <img src="${img}" alt="${mapName}" style="width:100%;height:100%;object-fit:cover;"
               onerror="this.closest('.map-avatar').style.padding='';this.closest('.map-avatar').textContent='${letter}';" />
        </div>`;
      }
      return `<div class="map-avatar">${letter}</div>`;
    }

    let allMatches = [];
    let activeTab = "All Matches";

    async function loadMatches() {
      const wrap = document.getElementById("matchesTableWrap");
      try {
        const session = AUTH.getSession();
        const res = await fetch(`${API_URL}/api/matches.php`, {
          headers: { Authorization: `Bearer ${session.token}` },
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to load matches");
        allMatches = data.matches || [];
      } catch (err) {
        wrap.innerHTML = `<div style="padding:24px; color:var(--danger); font-size:14px;">Could not load matches yet — connect this page to your PHP backend's /api/matches.php (see README). (${err.message})</div>`;
        return;
      }
      renderTable();
    }

    function renderTable() {
      const wrap = document.getElementById("matchesTableWrap");
      let filtered = allMatches;
      if (activeTab === "Tournament") filtered = allMatches.filter((m) => (m.mode || "").toLowerCase() === "tournament");
      if (activeTab === "Scrims") filtered = allMatches.filter((m) => (m.mode || "").toLowerCase() === "scrims");
      if (activeTab === "Daily Battle") filtered = allMatches.filter((m) => (m.mode || "").toLowerCase() === "daily battle");

      if (filtered.length === 0) {
        wrap.innerHTML = `<div style="padding:24px; color:var(--muted); font-size:14px;">No matches yet. Upload a screenshot in Stats Analyzer to get started.</div>`;
        return;
      }

      wrap.innerHTML = `
        <table>
          <thead><tr><th>Map</th><th>Placement</th><th>Placement Pts</th><th>Total Kills</th><th>Total Points</th><th>MVP</th></tr></thead>
          <tbody>
            ${filtered.map((m) => `
              <tr>
                <td><div style="display:flex; align-items:center; gap:12px;">${mapAvatarHtml(m.map)}<span style="font-weight:500;">${m.map || "Unknown"}</span></div></td>
                <td class="text-success">${m.placement ? "#" + m.placement : "-"}</td>
                <td>${m.placement_points ?? "-"}</td>
                <td>${m.kills ?? "-"}</td>
                <td class="text-primary-light" style="font-weight:600;">${m.points ?? "-"}</td>
                <td class="text-warning">${m.mvp ?? "-"}</td>
              </tr>`).join("")}
          </tbody>
        </table>`;
    }

    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        activeTab = btn.dataset.tab;
        renderTable();
      });
    });

    document.getElementById("toggleAddForm").addEventListener("click", () => {
      const form = document.getElementById("customForm");
      form.style.display = form.style.display === "none" ? "flex" : "none";
    });

    function recalcCustom() {
      const kills = [cP1, cP2, cP3, cP4].map((el) => Number(el.value) || 0);
      const names = [cP1Name, cP2Name, cP3Name, cP4Name].map((el, i) => el.value.trim() || `Player ${i + 1}`);
      const total = kills.reduce((a, b) => a + b, 0);
      const placement = Number(cPlacement.value) || null;
      document.getElementById("cTotalKills").textContent = total;
      document.getElementById("cTotalPoints").textContent = getTotalPoints(placement, total);
      document.getElementById("cMvp").textContent = total > 0 ? names[kills.indexOf(Math.max(...kills))] : "-";
    }
    const cP1 = document.getElementById("cP1"), cP2 = document.getElementById("cP2"),
          cP3 = document.getElementById("cP3"), cP4 = document.getElementById("cP4"),
          cP1Name = document.getElementById("cP1Name"), cP2Name = document.getElementById("cP2Name"),
          cP3Name = document.getElementById("cP3Name"), cP4Name = document.getElementById("cP4Name"),
          cPlacement = document.getElementById("cPlacement");
    [cP1, cP2, cP3, cP4, cP1Name, cP2Name, cP3Name, cP4Name, cPlacement].forEach((el) => el.addEventListener("input", recalcCustom));

    document.getElementById("customForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const kills = [cP1, cP2, cP3, cP4].map((el) => Number(el.value) || 0);
      const names = [cP1Name, cP2Name, cP3Name, cP4Name].map((el) => el.value.trim() || null);
      const total = kills.reduce((a, b) => a + b, 0);
      const placement = Number(cPlacement.value) || null;
      const msg = document.getElementById("customMsg");
      const mvpIndex = total > 0 ? kills.indexOf(Math.max(...kills)) : -1;

      try {
        const session = AUTH.getSession();
        const res = await fetch(`${API_URL}/api/matches.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${session.token}` },
          body: JSON.stringify({
            map: cMap.value,
            placement,
            placementPoints: getPlacementPoints(placement),
            player1Name: names[0], player2Name: names[1], player3Name: names[2], player4Name: names[3],
            player1Kills: kills[0], player2Kills: kills[1], player3Kills: kills[2], player4Kills: kills[3],
            totalKills: total,
            totalPoints: getTotalPoints(placement, total),
            mvp: mvpIndex >= 0 ? (names[mvpIndex] || `Player ${mvpIndex + 1}`) : null,
            mode: cMode.value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to add match");
        msg.textContent = "Match added.";
        msg.className = "text-primary-light";
        msg.style.display = "block";
        [cP1, cP2, cP3, cP4, cP1Name, cP2Name, cP3Name, cP4Name, cPlacement].forEach((el) => (el.value = ""));
        recalcCustom();
        loadMatches();
      } catch (err) {
        msg.textContent = err.message;
        msg.className = "text-danger";
        msg.style.display = "block";
      }
    });
    const cMode = document.getElementById("cMode");

    loadMatches();
  </script>
</body>
</html>
