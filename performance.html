<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Performance — FRAGK</title>
  <link rel="stylesheet" href="css/style.css" />
<script src="js/chart.min.js"></script></head>
<body>
  <div class="mobile-backdrop" onclick="toggleMobileSidebar()"></div>
  <div class="app-shell">
    <aside class="sidebar"></aside>
    <div class="main-content">
      <div class="topbar-mount"></div>

      <main class="page-body">
        <div class="tabs">
          <button class="tab-btn active">Overview</button>
          <button class="tab-btn">K/D Analysis</button>
          <button class="tab-btn">Rank Analysis</button>
          <button class="tab-btn">Win Analysis</button>
          <button class="tab-btn">Damage Analysis</button>
        </div>

        <div class="stat-grid" style="grid-template-columns:repeat(2,1fr);">
          <div class="card stat-card"><p class="label">Matches Played</p><p class="value">32</p><p class="delta">↑ 12% vs last 7 days</p></div>
          <div class="card stat-card"><p class="label">Total Kills</p><p class="value">148</p><p class="delta">↑ 18% vs last 7 days</p></div>
          <div class="card stat-card"><p class="label">Win Rate</p><p class="value">28.6%</p><p class="delta">↑ 7% vs last 7 days</p></div>
          <div class="card stat-card"><p class="label">K/D Ratio</p><p class="value">4.63</p><p class="delta">↑ 15% vs last 7 days</p></div>
          <div class="card stat-card"><p class="label">Total Damage</p><p class="value">45,620</p><p class="delta">↑ 20% vs last 7 days</p></div>
        </div>

        <div class="grid-2">
          <div class="card" style="padding:20px;">
            <p class="section-title">K/D Ratio Over Time</p>
            <div class="chart-wrap" style="height:180px;"><canvas id="kdChart"></canvas></div>
          </div>
          <div class="card" style="padding:20px;">
            <p class="section-title">Top Stats</p>
            <div id="topStats" style="display:flex; flex-direction:column; gap:10px;"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/charts.js"></script>
  <script>
    AUTH.requireAuth();
    initShell("performance.html", "Performance", "Track and improve your overall game performance.");

    const KD_LABELS = ["May 12", "May 13", "May 14", "May 15", "May 16", "May 17", "May 18"];
    const KD_VALUES = [3.2, 3.9, 3.4, 5.1, 4.2, 5.8, 4.63];
    makeLineChart("kdChart", KD_LABELS, [{ label: "K/D Ratio", data: KD_VALUES, color: "#22d3ee", fill: true }]);

    const TOP_STATS = [
      { label: "Most Kills", value: "15" },
      { label: "Most Damage", value: "2450" },
      { label: "Longest Survival", value: "28m 45s" },
      { label: "Headshot %", value: "32.4%" },
      { label: "Accuracy %", value: "24.6%" },
    ];
    document.getElementById("topStats").innerHTML = TOP_STATS.map(
      (s) => `<div style="display:flex; justify-content:space-between; font-size:14px;"><span class="text-muted">${s.label}</span><span style="font-weight:500;">${s.value}</span></div>`
    ).join("");
  </script>
</body>
</html>
