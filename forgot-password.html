<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — FRAGK</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
    <div class="card" style="width:100%; max-width:380px; padding:32px;">
      <div style="text-align:center; margin-bottom:24px;">
        <img src="assets/logo.png" alt="FRAGK" style="height:28px;" />
        <h2 style="margin:16px 0 4px; font-size:22px; font-weight:700;">Forgot Password?</h2>
        <p class="text-muted" style="font-size:13px;">Enter your email and we'll send you a reset link.</p>
      </div>

      <div id="formError" class="form-error"></div>
      <div id="formSuccess" style="display:none; background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:var(--success); font-size:13px; padding:12px; border-radius:8px; margin-bottom:16px;"></div>

      <form id="forgotForm">
        <div class="auth-field">
          <label class="field-label" for="email">Email Address</label>
          <input class="input" type="email" id="email" placeholder="Enter your email" required />
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">Send Reset Link</button>
      </form>

      <p class="auth-footer-text">Remembered your password? <a href="index.html">Back to Login</a></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    document.getElementById("forgotForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById("formError");
      const successBox = document.getElementById("formSuccess");
      const submitBtn = document.getElementById("submitBtn");
      errorBox.classList.remove("show");
      successBox.style.display = "none";

      const email = document.getElementById("email").value.trim();
      submitBtn.textContent = "Sending…";
      submitBtn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/api/forgot-password.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, siteUrl: window.location.origin }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Something went wrong");

        successBox.textContent = data.message;
        successBox.style.display = "block";
        document.getElementById("forgotForm").reset();
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add("show");
      } finally {
        submitBtn.textContent = "Send Reset Link";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
