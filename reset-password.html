<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — FRAGK</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;">
    <div class="card" style="width:100%; max-width:380px; padding:32px;">
      <div style="text-align:center; margin-bottom:24px;">
        <img src="assets/logo.png" alt="FRAGK" style="height:28px;" />
        <h2 style="margin:16px 0 4px; font-size:22px; font-weight:700;">Set a New Password</h2>
      </div>

      <div id="formError" class="form-error"></div>
      <div id="formSuccess" style="display:none; background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:var(--success); font-size:13px; padding:12px; border-radius:8px; margin-bottom:16px;"></div>

      <form id="resetForm">
        <div class="auth-field">
          <label class="field-label" for="password">New Password</label>
          <div class="input-wrap">
            <input class="input" type="password" id="password" placeholder="At least 6 characters" required minlength="6" />
            <button type="button" class="toggle-visibility" data-target="password">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke="currentColor" fill="none"/><circle cx="12" cy="12" r="3" stroke="currentColor" fill="none"/></svg>
            </button>
          </div>
        </div>
        <div class="auth-field">
          <label class="field-label" for="confirmPassword">Confirm New Password</label>
          <div class="input-wrap">
            <input class="input" type="password" id="confirmPassword" placeholder="Re-enter password" required minlength="6" />
            <button type="button" class="toggle-visibility" data-target="confirmPassword">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" stroke="currentColor" fill="none"/><circle cx="12" cy="12" r="3" stroke="currentColor" fill="none"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">Reset Password</button>
      </form>

      <p class="auth-footer-text"><a href="index.html">Back to Login</a></p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get("token");
    if (!token) {
      document.getElementById("formError").textContent = "This reset link is missing its token. Request a new one from the Forgot Password page.";
      document.getElementById("formError").classList.add("show");
      document.getElementById("resetForm").style.display = "none";
    }

    document.querySelectorAll(".toggle-visibility").forEach((btn) => {
      btn.addEventListener("click", () => {
        const input = document.getElementById(btn.dataset.target);
        input.type = input.type === "password" ? "text" : "password";
      });
    });

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById("formError");
      const successBox = document.getElementById("formSuccess");
      const submitBtn = document.getElementById("submitBtn");
      errorBox.classList.remove("show");
      successBox.style.display = "none";

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        errorBox.textContent = "Passwords do not match.";
        errorBox.classList.add("show");
        return;
      }

      submitBtn.textContent = "Resetting…";
      submitBtn.disabled = true;

      try {
        const res = await fetch(`${API_URL}/api/reset-password.php`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to reset password");

        successBox.textContent = "Password reset! Redirecting to login…";
        successBox.style.display = "block";
        document.getElementById("resetForm").style.display = "none";
        setTimeout(() => (window.location.href = "index.html"), 1800);
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add("show");
        submitBtn.textContent = "Reset Password";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
